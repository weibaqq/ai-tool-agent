services:
  ai-tool-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tool-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MODEL_V4_FLASH: ${MODEL_V4_FLASH:-deepseek-v4-flash}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.3}
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: ai-tool-agent-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
