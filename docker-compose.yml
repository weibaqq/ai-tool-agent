services:
  ai-tool-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-tool-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MODEL_V4_FLASH: ${MODEL_V4_FLASH:-deepseek-v4-flash}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.3}
    restart: unless-stopped